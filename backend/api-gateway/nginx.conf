# =============================================================================
# BetAction API Gateway — Nginx Configuration
# =============================================================================

user  nginx;
worker_processes  auto;           # one worker per available CPU core

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

# =============================================================================
# Events
# =============================================================================
events {
    worker_connections  1024;     # max simultaneous connections per worker
    multi_accept        on;       # accept all pending connections at once
    use                 epoll;    # efficient I/O model for Linux
}

# =============================================================================
# HTTP
# =============================================================================
http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Structured JSON access log ────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"args":"$args",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile             on;
    tcp_nopush           on;      # batch TCP packets — reduces number of sends
    tcp_nodelay          on;      # disable Nagle's algorithm for WebSocket
    keepalive_timeout    65;
    keepalive_requests   100;

    # Hide Nginx version from error pages and Server header
    server_tokens        off;

    # ── Request size limits ───────────────────────────────────────────────────
    client_body_buffer_size       16k;
    client_header_buffer_size     1k;
    client_max_body_size          10m;
    large_client_header_buffers   4 8k;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    client_body_timeout    12s;
    client_header_timeout  12s;
    send_timeout           10s;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss;

    # ── Load modular configs ──────────────────────────────────────────────────
    # Order of glob expansion is alphabetical on most filesystems:
    #   1. rate-limiting.conf  — limit_req_zone / limit_conn_zone (http ctx)
    #   2. security-headers.conf — map + add_header directives    (http ctx)
    #   3. upstream.conf       — upstream blocks                  (http ctx)
    # All three are valid in http context and are loaded before the server block
    # that references their variables/zones/upstreams below.
    include /etc/nginx/conf.d/*.conf;

    # =========================================================================
    # Main API server — port 80
    # =========================================================================
    server {
        listen       80;
        listen       [::]:80;
        server_name  _;

        # ── CORS preflight (OPTIONS) ──────────────────────────────────────────
        # Respond to preflight requests at the gateway level so upstream
        # services do not need to handle OPTIONS themselves.
        # $cors_origin is set by the map in security-headers.conf.
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin          always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Content-Type, Authorization" always;
            add_header Access-Control-Allow-Credentials "true"                always;
            add_header Access-Control-Max-Age           86400                 always;
            add_header Content-Length                   0;
            add_header Content-Type                     "text/plain";
            return 204;
        }

        # ── Gateway health endpoints ──────────────────────────────────────────

        location = / {
            default_type text/plain;
            return 200 "BetAction API Gateway is running\n";
        }

        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"api-gateway","timestamp":"$time_iso8601"}';
        }

        # ── Auth Service  (/api/auth/** → auth-service:3001/api/auth/**) ──────
        # auth-service registers its routes under /api/auth, so we preserve
        # the full path by omitting a trailing slash on proxy_pass.
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass         http://auth_service;
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;
            proxy_set_header   Connection          "";
            proxy_http_version 1.1;
            proxy_read_timeout 90s;
        }

        # ── Match Service  (/api/matches/** → match-service:3002/matches/**) ──
        # match-service routes are at /matches/…  (no /api prefix),
        # so we rewrite the path by replacing /api/matches/ with /matches/.
        location /api/matches/ {
            limit_req zone=api burst=20 nodelay;

            rewrite ^/api/matches/(.*)$ /matches/$1 break;

            proxy_pass         http://match_service;
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;
            proxy_set_header   Connection          "";
            proxy_http_version 1.1;
            proxy_read_timeout 90s;
        }

        # ── Prediction Service  (/api/predictions/** → prediction-service:8000/predictions/**) ──
        # prediction-service router is prefixed with /predictions,
        # so we rewrite accordingly.
        location /api/predictions/ {
            limit_req zone=api burst=20 nodelay;

            rewrite ^/api/predictions/(.*)$ /predictions/$1 break;

            proxy_pass         http://prediction_service;
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;
            proxy_set_header   Connection          "";
            proxy_http_version 1.1;
            proxy_read_timeout 90s;
        }

        # ── Notification Service REST  (/api/notifications/** → notification-service:3003/**) ──
        # notification-service routes are at root level (/health, /stats, /notify/…).
        # Strip /api/notifications/ prefix by replacing it with /.
        location /api/notifications/ {
            rewrite ^/api/notifications/(.*)$ /$1 break;

            proxy_pass         http://notification_service;
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;
            proxy_set_header   Connection          "";
            proxy_http_version 1.1;
            proxy_read_timeout 90s;
        }

        # ── Socket.io (WebSocket + long-poll fallback) ────────────────────────
        # Proxies both ws:// upgrades and HTTP long-polling to notification-service.
        # Must set Connection "upgrade" (not "") when proxying WebSockets.
        location /socket.io/ {
            limit_conn ws_limit 20;

            proxy_pass         http://notification_service/socket.io/;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header   Upgrade             $http_upgrade;
            proxy_set_header   Connection          "upgrade";

            # Standard proxy headers
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;

            # Longer timeouts — WebSocket connections are long-lived
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;

            # Disable buffering for real-time data
            proxy_buffering     off;
        }

        # ── Catch-all 404 ────────────────────────────────────────────────────
        location / {
            default_type application/json;
            return 404 '{"error":"Not Found","message":"No route matches this path"}';
        }

        # ── Custom error pages ────────────────────────────────────────────────
        error_page 429 = @rate_limited;
        error_page 502 503 504 = @upstream_error;

        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down."}';
        }

        location @upstream_error {
            default_type application/json;
            return 502 '{"error":"Bad Gateway","message":"An upstream service is currently unavailable."}';
        }
    }
}
