# =============================================================================
# Upstream service definitions
# Each upstream block maps a logical name to a backend container:port.
# In Docker Compose the service name IS the DNS hostname.
# keepalive: reuse TCP connections to each upstream to reduce latency.
# =============================================================================

upstream auth_service {
    server auth-service:3001;
    keepalive 32;
}

upstream match_service {
    server match-service:3002;
    keepalive 32;
}

upstream prediction_service {
    server prediction-service:8000;
    keepalive 32;
}

upstream notification_service {
    server notification-service:3003;
    keepalive 32;
}
