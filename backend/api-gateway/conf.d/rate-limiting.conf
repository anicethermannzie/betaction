# =============================================================================
# Rate-limiting zones
#
# Zones are defined in the http context and referenced by name in location
# blocks inside the server block (nginx.conf).
#
# $binary_remote_addr uses the binary form of the client IP address as the
# zone key — 4 bytes for IPv4 / 16 bytes for IPv6. More memory-efficient
# than $remote_addr.
#
# Zone memory allocation:
#   1 MB stores ≈ 16 000 states for binary_remote_addr.
#   Use 10m (10 MB) to comfortably handle ~160 000 unique IPs.
# =============================================================================

# ── General API zone ─────────────────────────────────────────────────────────
# 10 requests/second per IP.
# Applied to: /api/matches, /api/predictions
limit_req_zone $binary_remote_addr zone=api:10m    rate=10r/s;

# ── Auth zone (stricter) ─────────────────────────────────────────────────────
# 5 requests/second per IP — reduces brute-force attack surface on
# login and register endpoints.
# Applied to: /api/auth
limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/s;

# ── WebSocket connection limit ────────────────────────────────────────────────
# Max 20 simultaneous WebSocket connections per IP.
# Applied to: /socket.io
limit_conn_zone $binary_remote_addr zone=ws_limit:10m;

# ── Default status codes when limits are hit ─────────────────────────────────
# 429 Too Many Requests (RFC 6585) is more semantically correct than 503.
limit_req_status  429;
limit_conn_status 429;
