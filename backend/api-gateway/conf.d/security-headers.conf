# =============================================================================
# Security headers & CORS
#
# This file is included via `include /etc/nginx/conf.d/*.conf;` in the http
# block of nginx.conf.  All directives here are valid in http context and
# are inherited by every server and location block unless overridden.
#
# CORS origin handling
# --------------------
# The `map` directive evaluates $http_origin per-request and assigns
# $cors_origin the exact request origin when it is whitelisted, or an
# empty string otherwise.  An empty Access-Control-Allow-Origin header
# causes the browser to block the cross-origin request — correct behaviour.
#
# To add a production domain, uncomment the relevant line or add a new one.
# =============================================================================

# ── CORS allowed-origin map ───────────────────────────────────────────────────
map $http_origin $cors_origin {
    # Local development
    ~^https?://localhost(:[0-9]+)?$     $http_origin;
    ~^https?://127\.0\.0\.1(:[0-9]+)?$ $http_origin;

    # Production — uncomment and replace with your real domain:
    # ~^https://betaction\.yourdomain\.com$ $http_origin;

    # All other origins → empty string (CORS request will be blocked)
    default "";
}

# ── Clickjacking protection ───────────────────────────────────────────────────
add_header X-Frame-Options           "DENY"                              always;

# ── MIME-type sniffing protection ─────────────────────────────────────────────
add_header X-Content-Type-Options    "nosniff"                           always;

# ── Legacy XSS filter (belt-and-braces alongside CSP) ────────────────────────
add_header X-XSS-Protection          "1; mode=block"                     always;

# ── Referrer policy ───────────────────────────────────────────────────────────
add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;

# ── Permissions policy (disable unnecessary browser features) ────────────────
add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

# ── Content Security Policy ───────────────────────────────────────────────────
# Tightened for a pure API gateway — no page assets are served here.
# Frontend should set its own CSP separately.
add_header Content-Security-Policy
    "default-src 'none'; frame-ancestors 'none';"                        always;

# ── CORS headers (dynamic origin from map) ───────────────────────────────────
add_header Access-Control-Allow-Origin      $cors_origin                 always;
add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
add_header Access-Control-Allow-Headers     "Content-Type, Authorization" always;
add_header Access-Control-Allow-Credentials "true"                       always;
add_header Access-Control-Max-Age           86400                        always;
