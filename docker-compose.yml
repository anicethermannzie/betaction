# =============================================================================
# BetAction — Docker Compose (local development)
# Usage: docker compose up --build
# Copy .env.example to .env and fill in the required values before running.
# =============================================================================

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: betaction-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped
    networks:
      - betaction-network

  redis:
    image: redis:7-alpine
    container_name: betaction-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped
    networks:
      - betaction-network

  # ── Backend microservices ───────────────────────────────────────────────────

  auth-service:
    build:
      context:    ./backend/auth-service
      dockerfile: Dockerfile
    container_name: betaction-auth
    env_file: ./backend/auth-service/.env
    environment:
      NODE_ENV: development
      DB_HOST:  postgres
      DB_PORT:  "5432"
      REDIS_HOST: redis
    ports:
      - "3001:3001"
    volumes:
      - ./backend/auth-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout:  5s
      start_period: 15s
      retries:  3
    restart: unless-stopped
    networks:
      - betaction-network

  match-service:
    build:
      context:    ./backend/match-service
      dockerfile: Dockerfile
    container_name: betaction-match
    env_file: ./backend/match-service/.env
    environment:
      NODE_ENV:   development
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "3002:3002"
    volumes:
      - ./backend/match-service/src:/app/src
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout:  5s
      start_period: 15s
      retries:  3
    restart: unless-stopped
    networks:
      - betaction-network

  prediction-service:
    build:
      context:    ./backend/prediction-service
      dockerfile: Dockerfile
    container_name: betaction-prediction
    env_file: ./backend/prediction-service/.env
    environment:
      MATCH_SERVICE_URL: http://match-service:3002
      REDIS_HOST:        redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend/prediction-service/src:/app/src
    depends_on:
      redis:
        condition: service_healthy
      match-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout:  5s
      start_period: 20s
      retries:  3
    restart: unless-stopped
    networks:
      - betaction-network

  notification-service:
    build:
      context:    ./backend/notification-service
      dockerfile: Dockerfile
    container_name: betaction-notification
    env_file: ./backend/notification-service/.env
    environment:
      NODE_ENV:          development
      REDIS_HOST:        redis
      MATCH_SERVICE_URL: http://match-service:3002
    ports:
      - "3003:3003"
    volumes:
      - ./backend/notification-service/src:/app/src
    depends_on:
      redis:
        condition: service_healthy
      match-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout:  5s
      start_period: 15s
      retries:  3
    restart: unless-stopped
    networks:
      - betaction-network

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: betaction-frontend
    env_file: ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL:    http://nginx/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3003
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - auth-service
      - match-service
      - prediction-service
      - notification-service
    restart: unless-stopped
    networks:
      - betaction-network

  # ── API Gateway ─────────────────────────────────────────────────────────────

  nginx:
    build:
      context:    ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: betaction-nginx
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - match-service
      - prediction-service
      - notification-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout:  5s
      start_period: 10s
      retries:  3
    restart: unless-stopped
    networks:
      - betaction-network

# ── Networks ──────────────────────────────────────────────────────────────────

networks:
  betaction-network:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
