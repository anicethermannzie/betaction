name: Deploy to Staging

on:
  push:
    branches: [develop]

concurrency:
  group: cd-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECS_CLUSTER: ${{ secrets.ECS_STAGING_CLUSTER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images to ECR
        run: |
          declare -A CONTEXTS=(
            [auth-service]=./backend/auth-service
            [match-service]=./backend/match-service
            [prediction-service]=./backend/prediction-service
            [notification-service]=./backend/notification-service
            [frontend]=./frontend
            [api-gateway]=./backend/api-gateway
          )

          for service in "${!CONTEXTS[@]}"; do
            context="${CONTEXTS[$service]}"
            repo="$ECR_REGISTRY/betaction-$service"
            echo "Building and pushing $service..."
            docker build \
              -t "$repo:${{ github.sha }}" \
              -t "$repo:staging-latest" \
              "$context"
            docker push "$repo:${{ github.sha }}"
            docker push "$repo:staging-latest"
            echo "Pushed $service"
          done

      - name: Download current ECS task definitions
        run: |
          mkdir -p task-defs
          for service in auth-service match-service prediction-service notification-service frontend api-gateway; do
            aws ecs describe-task-definition \
              --task-definition betaction-staging-$service \
              --query taskDefinition \
              > task-defs/$service.json
          done

      - name: Update task definition images
        run: |
          for service in auth-service match-service prediction-service notification-service frontend api-gateway; do
            repo="$ECR_REGISTRY/betaction-$service"
            # Replace image tag in task definition
            jq --arg IMAGE "$repo:${{ github.sha }}" \
              '.containerDefinitions[0].image = $IMAGE |
               del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
              task-defs/$service.json > task-defs/$service-updated.json
          done

      - name: Register and deploy updated task definitions
        id: deploy
        run: |
          for service in auth-service match-service prediction-service notification-service frontend api-gateway; do
            echo "Registering task definition for $service..."
            TASK_DEF_ARN=$(aws ecs register-task-definition \
              --cli-input-json file://task-defs/$service-updated.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            echo "Deploying $service with $TASK_DEF_ARN..."
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "betaction-staging-$service" \
              --task-definition "$TASK_DEF_ARN" \
              --force-new-deployment \
              --output none
          done

      - name: Wait for services to stabilize
        run: |
          for service in auth-service match-service prediction-service notification-service frontend api-gateway; do
            echo "Waiting for $service to stabilize..."
            aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services "betaction-staging-$service"
            echo "$service is stable"
          done

      - name: Run smoke tests against staging
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          echo "Running smoke tests against $STAGING_URL..."
          sleep 15

          check() {
            local url="$1"
            local label="$2"
            local status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            if [ "$status" -eq 200 ]; then
              echo "PASS: $label ($status)"
            else
              echo "FAIL: $label ($status)"
              return 1
            fi
          }

          check "$STAGING_URL/health"                "Frontend health"
          check "$STAGING_URL/api/auth/health"       "Auth service health"
          check "$STAGING_URL/api/matches/health"    "Match service health"
          check "$STAGING_URL/api/predictions/health" "Prediction service health"
          echo "All smoke tests passed"

      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{
                \"text\": \":white_check_mark: *Staging deploy succeeded*\",
                \"attachments\": [{
                  \"color\": \"good\",
                  \"fields\": [
                    {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                    {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true},
                    {\"title\": \"Author\", \"value\": \"${{ github.actor }}\", \"short\": true},
                    {\"title\": \"Environment\", \"value\": \"staging\", \"short\": true}
                  ]
                }]
              }"
          else
            echo "Staging deploy succeeded — commit ${{ github.sha }} by ${{ github.actor }}"
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{
                \"text\": \":x: *Staging deploy FAILED*\",
                \"attachments\": [{
                  \"color\": \"danger\",
                  \"fields\": [
                    {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                    {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true},
                    {\"title\": \"Author\", \"value\": \"${{ github.actor }}\", \"short\": true},
                    {\"title\": \"Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                  ]
                }]
              }"
          else
            echo "Staging deploy FAILED — commit ${{ github.sha }} by ${{ github.actor }}"
          fi
