name: PR Quality Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check PR title follows conventional commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|ci|ops|revert)(\(.+\))?: .{1,100}$'
          if echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "PR title is valid: $PR_TITLE"
          else
            echo "::error::PR title must follow conventional commits format."
            echo "::error::Expected: type(scope)?: description"
            echo "::error::Types: feat, fix, docs, style, refactor, perf, test, chore, ci, ops, revert"
            echo "::error::Got: $PR_TITLE"
            exit 1
          fi

      - name: Check PR has description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ] || [ ${#PR_BODY} -lt 20 ]; then
            echo "::error::PR description is missing or too short. Please describe what this PR does."
            exit 1
          fi
          echo "PR has a description (${#PR_BODY} chars)"

  check-commits:
    name: Commit Message Format
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|ci|ops|revert)(\(.+\))?: .+'

          FAILED=0
          while IFS= read -r line; do
            msg=$(echo "$line" | sed 's/^[a-f0-9]* //')
            # Skip merge commits
            if echo "$msg" | grep -q "^Merge "; then
              continue
            fi
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "::warning::Non-conventional commit: $msg"
              FAILED=1
            else
              echo "OK: $msg"
            fi
          done < <(git log "$BASE_SHA".."$HEAD_SHA" --pretty=format:"%h %s" --no-merges)

          if [ "$FAILED" -eq 1 ]; then
            echo "::warning::Some commits do not follow conventional commits format."
          fi

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: betaction_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: betaction_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: test-jwt-secret-ci
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            backend/auth-service/node_modules
            backend/match-service/node_modules
            backend/notification-service/node_modules
            frontend/node_modules
          key: node-modules-pr-${{ runner.os }}-${{ hashFiles('backend/auth-service/package-lock.json', 'backend/match-service/package-lock.json', 'backend/notification-service/package-lock.json', 'frontend/package-lock.json') }}
          restore-keys: |
            node-modules-pr-${{ runner.os }}-

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pr-${{ runner.os }}-${{ hashFiles('backend/prediction-service/requirements*.txt') }}
          restore-keys: |
            pip-pr-${{ runner.os }}-

      - name: Install all dependencies
        run: |
          for service in auth-service match-service notification-service; do
            (cd backend/$service && npm ci)
          done
          (cd frontend && npm ci)
          (cd backend/prediction-service && pip install -r requirements.txt -r requirements-dev.txt)

      - name: Run linters
        run: |
          for service in auth-service match-service notification-service; do
            echo "Linting $service..."
            (cd backend/$service && npm run lint)
          done
          (cd frontend && npm run lint)
          pip install ruff
          (cd backend/prediction-service && ruff check .)

      - name: Run Node.js tests with coverage
        id: node-tests
        run: |
          TOTAL_LINES=0
          COVERED_LINES=0
          for service in auth-service match-service notification-service; do
            echo "Testing $service..."
            cd backend/$service
            npm test -- --coverage --coverageReporters=json-summary 2>&1 | tee /tmp/$service-test.log || true
            if [ -f coverage/coverage-summary.json ]; then
              lines=$(jq '.total.lines.pct' coverage/coverage-summary.json 2>/dev/null || echo 0)
              echo "$service coverage: $lines%"
            fi
            cd ../..
          done

      - name: Run Python tests with coverage
        run: |
          cd backend/prediction-service
          pytest --cov=. --cov-report=json --cov-report=term-missing -q 2>&1 | tee /tmp/prediction-test.log || true

      - name: Collect coverage summary
        id: coverage
        run: |
          SUMMARY="## Test Coverage\n\n"
          for service in auth-service match-service notification-service; do
            SUMMARY_FILE="backend/$service/coverage/coverage-summary.json"
            if [ -f "$SUMMARY_FILE" ]; then
              pct=$(jq '.total.lines.pct' "$SUMMARY_FILE" 2>/dev/null || echo "N/A")
              SUMMARY+="- **$service**: $pct% line coverage\n"
            else
              SUMMARY+="- **$service**: coverage data unavailable\n"
            fi
          done
          if [ -f backend/prediction-service/coverage.json ]; then
            pct=$(jq '.totals.percent_covered' backend/prediction-service/coverage.json 2>/dev/null || echo "N/A")
            SUMMARY+="- **prediction-service**: $pct% line coverage\n"
          fi
          echo "SUMMARY<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment coverage on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const summary = `${{ steps.coverage.outputs.SUMMARY }}`;
            const body = `### CI Results\n\n${summary}\n\n*Updated by PR Quality Checks workflow*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('CI Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  label-pr:
    name: Auto-label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'synchronize')

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label PR based on changed files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const paths = files.map(f => f.filename);
            const labels = new Set();

            const rules = [
              { pattern: /^frontend\//, label: 'frontend' },
              { pattern: /^backend\/auth-service\//, label: 'auth' },
              { pattern: /^backend\/match-service\//, label: 'match' },
              { pattern: /^backend\/prediction-service\//, label: 'prediction' },
              { pattern: /^backend\/notification-service\//, label: 'notification' },
              { pattern: /^backend\/api-gateway\//, label: 'api-gateway' },
              { pattern: /^infrastructure\//, label: 'devops' },
              { pattern: /^\.github\//, label: 'devops' },
              { pattern: /^monitoring\//, label: 'devops' },
              { pattern: /^docs\//, label: 'documentation' },
              { pattern: /\.(md|txt|rst)$/, label: 'documentation' },
              { pattern: /^scripts\//, label: 'devops' },
            ];

            for (const { pattern, label } of rules) {
              if (paths.some(p => pattern.test(p))) {
                labels.add(label);
              }
            }

            if (labels.size > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [...labels],
                });
                console.log(`Added labels: ${[...labels].join(', ')}`);
              } catch (e) {
                console.log(`Could not add labels (they may not exist yet): ${e.message}`);
              }
            }
