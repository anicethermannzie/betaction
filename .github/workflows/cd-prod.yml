name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECS_CLUSTER: ${{ secrets.ECS_PROD_CLUSTER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images to ECR
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          declare -A CONTEXTS=(
            [auth-service]=./backend/auth-service
            [match-service]=./backend/match-service
            [prediction-service]=./backend/prediction-service
            [notification-service]=./backend/notification-service
            [frontend]=./frontend
            [api-gateway]=./backend/api-gateway
          )

          for service in "${!CONTEXTS[@]}"; do
            context="${CONTEXTS[$service]}"
            repo="$ECR_REGISTRY/betaction-$service"
            echo "Building and pushing $service..."
            docker build \
              -t "$repo:${{ github.sha }}" \
              -t "$repo:latest" \
              -t "$repo:$VERSION" \
              "$context"
            docker push "$repo:${{ github.sha }}"
            docker push "$repo:latest"
            docker push "$repo:$VERSION"
            echo "Pushed $service"
          done

      - name: Download current ECS task definitions
        run: |
          mkdir -p task-defs
          for service in auth-service match-service prediction-service notification-service frontend api-gateway; do
            aws ecs describe-task-definition \
              --task-definition betaction-prod-$service \
              --query taskDefinition \
              > task-defs/$service.json
          done

      - name: Update task definition images
        run: |
          for service in auth-service match-service prediction-service notification-service frontend api-gateway; do
            repo="$ECR_REGISTRY/betaction-$service"
            jq --arg IMAGE "$repo:${{ github.sha }}" \
              '.containerDefinitions[0].image = $IMAGE |
               del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
              task-defs/$service.json > task-defs/$service-updated.json
          done

      - name: Register and deploy updated task definitions
        run: |
          for service in auth-service match-service prediction-service notification-service frontend api-gateway; do
            echo "Registering task definition for $service..."
            TASK_DEF_ARN=$(aws ecs register-task-definition \
              --cli-input-json file://task-defs/$service-updated.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            echo "Deploying $service with $TASK_DEF_ARN..."
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "betaction-prod-$service" \
              --task-definition "$TASK_DEF_ARN" \
              --force-new-deployment \
              --output none
          done

      - name: Wait for services to stabilize
        run: |
          for service in auth-service match-service prediction-service notification-service frontend api-gateway; do
            echo "Waiting for $service to stabilize..."
            aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services "betaction-prod-$service"
            echo "$service is stable"
          done

      - name: Run smoke tests against production
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          echo "Running smoke tests against $PROD_URL..."
          sleep 20

          check() {
            local url="$1"
            local label="$2"
            local status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url")
            if [ "$status" -eq 200 ]; then
              echo "PASS: $label ($status)"
            else
              echo "FAIL: $label ($status)"
              return 1
            fi
          }

          check "$PROD_URL/health"                   "Frontend health"
          check "$PROD_URL/api/auth/health"          "Auth service health"
          check "$PROD_URL/api/matches/health"       "Match service health"
          check "$PROD_URL/api/predictions/health"   "Prediction service health"
          echo "All production smoke tests passed"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          # Write multi-line output safely
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          release_name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## BetAction ${{ steps.version.outputs.VERSION }}

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Docker Images
            All images pushed to ECR with tags: `${{ steps.version.outputs.VERSION }}`, `latest`, `${{ github.sha }}`

            ### Deployment
            Deployed to production ECS cluster at ${{ env.PROD_URL }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{
                \"text\": \":rocket: *Production deploy succeeded* — $VERSION\",
                \"attachments\": [{
                  \"color\": \"good\",
                  \"fields\": [
                    {\"title\": \"Version\", \"value\": \"$VERSION\", \"short\": true},
                    {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true},
                    {\"title\": \"Author\", \"value\": \"${{ github.actor }}\", \"short\": true},
                    {\"title\": \"Environment\", \"value\": \"production\", \"short\": true}
                  ]
                }]
              }"
          else
            echo "Production deploy succeeded — version $VERSION by ${{ github.actor }}"
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{
                \"text\": \":fire: *Production deploy FAILED* — $VERSION\",
                \"attachments\": [{
                  \"color\": \"danger\",
                  \"fields\": [
                    {\"title\": \"Version\", \"value\": \"$VERSION\", \"short\": true},
                    {\"title\": \"Author\", \"value\": \"${{ github.actor }}\", \"short\": true},
                    {\"title\": \"Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                  ]
                }]
              }"
          else
            echo "Production deploy FAILED — version $VERSION by ${{ github.actor }}"
          fi
